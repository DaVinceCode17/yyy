<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Admin - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html, body {
            height: 100%;
            background: gray;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .phone-frame {
            padding-top: 50px;
            width: 390px;
            height: 844px;
            background: #4FC3F7;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .phone-frame::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame::-webkit-scrollbar-thumb {
            background: #1f6f8a;
            border-radius: 10px;
        }
        .welcome-header {
            text-align: center;
            padding: 6px 0px 10px 0px;
            color: #0f2b3a;
            margin-top: -35px;
            margin-bottom: 10px;
        }
        .welcome-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .welcome-header p {
            font-size: 0.8rem;
            color: #0f2b3a;
            opacity: 0.8;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 0px;
            margin-bottom: 10px;
            margin-right: 20px;
        }
        .top-bar a {
            font-size: 0.75rem;
            color: #0f2b3a;
            text-decoration: none;
            background: rgba(255,255,255,0.5);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
        }
        .top-bar a:hover {
            background: rgba(255,255,255,0.8);
        }

        .nav-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 10px 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex: 1;
            padding: 4px 0;
            align-items: center;
            border-radius: 60px;  /* ← IDAGDAG ITO */
        }
        
        .btn-scroll::-webkit-scrollbar {
            display: none;
        }
        .btn-scroll .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: #0f2b3a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            flex-shrink: 0;
            transition: 0.25s;
            white-space: nowrap;
        }
        .btn-scroll .btn i {
            margin-right: 6px;
        }
        .btn-scroll .btn:hover {
            background: #eef3f7;
            transform: translateY(-2px);
        }
        .btn-scroll .btn.active {
            background: #0f2b3a;
            color: white;
        }

        .nav-arrow {
            background: rgba(255,255,255,0.8);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1rem;
            font-weight: 700;
            color: #0f2b3a;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .nav-arrow:hover {
            background: rgba(255,255,255,0.9);
        }
        .nav-arrow:active {
            transform: scale(0.92);
        }

        .section {
            display: none;
            padding: 0;
            margin-top: 0px;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }
        .section.active {
            display: flex;
            flex-direction: column;
        }
        .form-card {
            width: 100%;
            height: 844px;
            background: white;
            border-radius: 20px;
            padding: 20px 16px;
            border: 1px solid #e8eef2;
            flex: 1;
            margin: 0 auto;
            margin-bottom: -331px;
        }
        .form-card h3 {
            font-size: 0.9rem;
            color: #0f2b3a;
            margin-bottom: 6px;
            text-align: center;
        }
        .pricing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }
        .pricing-item {
            background: #f8fbfd;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #e8eef2;
            text-align: center;
        }
        .pricing-item input {
            width: 70px;
            padding: 4px 6px;
            border-radius: 30px;
            border: 1px solid #dce6ed;
            text-align: center;
            margin-top: 4px;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: #0f2b3a;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.25s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #1a3f52;
        }
        .table-wrap {
            overflow-x: auto;
            margin-top: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        th, td {
            padding: 6px 8px;
            border: 1px solid #e8eef2;
            text-align: left;
        }
        th {
            background: #eef3f7;
            font-weight: 600;
            color: #0f2b3a;
        }
        .badge {
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
        }
        .badge.pending { background: #b8860b; }
        .badge.ongoing { background: #1f6f8a; }
        .badge.completed { background: #1a8c4a; }
        .action-btn {
            padding: 3px 10px;
            border: none;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .action-btn.start { background: #1f6f8a; }
        .action-btn.start:hover { background: #185a72; }
        .action-btn.complete { background: #1a8c4a; }
        .action-btn.complete:hover { background: #14753d; }
        .message {
            margin-top: 6px;
            font-size: 0.8rem;
            text-align: center;
        }
        .notification {
            padding: 10px 14px;
            border-radius: 12px;
            margin: 0 0px 10px 0px;
            font-size: 0.85rem;
            color: #0f2b3a;
            display: none;
        }
        .notification.show { display: block; }
        .notification.error { background: #FFEBEE; }
        .notification.success { background: #E8F5E9; }
        .flex-grow { flex: 1; }

        .confirm-dialog {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .confirm-dialog.show { display: flex; }
        .confirm-dialog .dialog-box {
            background: white;
            border-radius: 24px;
            max-width: 340px;
            width: 100%;
            padding: 24px 20px;
            text-align: center;
        }
        .confirm-dialog .dialog-box h4 {
            font-size: 1.1rem;
            color: #0f2b3a;
            margin-bottom: 6px;
        }
        .confirm-dialog .dialog-box p {
            color: #4f6f82;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .confirm-dialog .dialog-box .btn-row {
            display: flex;
            gap: 12px;
        }
        .confirm-dialog .dialog-box .btn-row .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .confirm-dialog .dialog-box .btn-row .btn-cancel {
            background: #eef3f7;
            color: #0f2b3a;
        }
        .confirm-dialog .dialog-box .btn-row .btn-cancel:hover {
            background: #dce6ed;
        }
        .confirm-dialog .dialog-box .btn-row .btn-confirm {
            background: #1f6f8a;
            color: white;
        }
        .confirm-dialog .dialog-box .btn-row .btn-confirm:hover {
            background: #185a72;
        }
        @media (max-width: 430px) {
            .phone-frame {
                max-height: 98vh;
                padding: 18px 0px;
                border-radius: 30px;
            }
            .btn-scroll .btn {
                padding: 8px 14px;
                font-size: 0.7rem;
            }
            .nav-arrow {
                width: 28px;
                height: 28px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="welcome-header">
        <div class="top-bar">
            <a href="index.html"><i style="margin-top: -30px;" class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        <h1>Welcome, Admin!</h1>
        <p>Manage your laundry shop here</p>
    </div>

    

    <div id="adminNotification" class="notification"></div>

    <div class="nav-wrapper">
        <button class="nav-arrow" id="scrollLeftBtn"><</button>
        <div class="btn-scroll" id="btnScroll">
            <button class="btn active" data-section="pricing"><i class="fas fa-tag"></i> Set Pricing</button>
            <button class="btn" data-section="pending"><i class="fas fa-clock"></i> Pending</button>
            <button class="btn" data-section="ongoing"><i class="fas fa-spinner"></i> Ongoing</button>
            <button class="btn" data-section="completed"><i class="fas fa-check-circle"></i> Completed</button>
        </div>
        <button class="nav-arrow" id="scrollRightBtn">></button>
    </div>

    <div id="section-pricing" class="section active">
        <div class="form-card">
            <h3><i class="fas fa-tag"></i> Set Pricing</h3>
            <div class="pricing-grid">
                <div class="pricing-item"><label>Wash</label><input type="number" id="priceWash" value="50" step="5" /></div>
                <div class="pricing-item"><label>Dry </label><input type="number" id="priceFold" value="20" step="5" /></div>
                <div class="pricing-item"><label>Fold</label><input type="number" id="priceFold" value="20" step="5" /></div>
            </div>
            <button class="btn-primary" id="updatePricingBtn"><i class="fas fa-save"></i> Update Pricing</button>
            <div id="pricingMessage" class="message"></div>
        </div>
    </div>

    <div id="section-pending" class="section">
        <div class="form-card">
            <h3><i class="fas fa-clock"></i> Pending Orders</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Action</th></tr></thead>
                    <tbody id="pendingTableBody"><tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="section-ongoing" class="section">
        <div class="form-card">
            <h3><i class="fas fa-spinner"></i> Ongoing</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Action</th></tr></thead>
                    <tbody id="ongoingTableBody"><tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="section-completed" class="section">
        <div class="form-card">
            <h3><i class="fas fa-check-circle"></i> Completed</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Status</th></tr></thead>
                    <tbody id="completedTableBody"><tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="flex-grow"></div>
</div>

<div class="confirm-dialog" id="confirmDialog">
    <div class="dialog-box">
        <h4><i class="fas fa-exclamation-triangle" style="color:#b8860b;"></i> Confirm Action</h4>
        <p id="confirmMessage">Move this order to the next stage?</p>
        <div class="btn-row">
            <button class="btn btn-cancel" id="confirmCancel">Cancel</button>
            <button class="btn btn-confirm" id="confirmOk">Confirm</button>
        </div>
    </div>
</div>

<script>
    const scrollContainer = document.getElementById('btnScroll');
    document.getElementById('scrollLeftBtn').addEventListener('click', () => {
        scrollContainer.scrollBy({ left: -140, behavior: 'smooth' });
    });
    document.getElementById('scrollRightBtn').addEventListener('click', () => {
        scrollContainer.scrollBy({ left: 140, behavior: 'smooth' });
    });

    document.querySelectorAll('.btn-scroll .btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.btn-scroll .btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const section = this.dataset.section;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + section).classList.add('active');
        });
    });

    document.getElementById('updatePricingBtn').addEventListener('click', function() {
        const wash = document.getElementById('priceWash').value;
        const dry = document.getElementById('priceDry').value;
        const fold = document.getElementById('priceFold').value;
        const pricing = { wash: parseFloat(wash), dry: parseFloat(dry), fold: parseFloat(fold) };
        localStorage.setItem('laundry_pricing', JSON.stringify(pricing));
        document.getElementById('pricingMessage').innerHTML = '<span style="color:#1a8c4a;">✅ Pricing updated!</span>';
    });

    function renderAdminTables() {
        const orders = JSON.parse(localStorage.getItem('laundry_orders') || '[]');
        const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');

        const pending = orders.filter(o => o.status === 'pending');
        const pendingBody = document.getElementById('pendingTableBody');
        pendingBody.innerHTML = pending.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>' :
            pending.map(o => {
                const user = users.find(u => u.id == o.customerId) || { firstName: 'Unknown', lastName: '' };
                return `<tr><td>${o.queueNumber}</td><td>${user.firstName || 'C'} ${user.lastName || ''}</td><td>${o.services}</td><td><button class="action-btn start" data-id="${o.id}" data-action="ongoing">▶ Start</button></td></tr>`;
            }).join('');

        const ongoing = orders.filter(o => o.status === 'ongoing');
        const ongoingBody = document.getElementById('ongoingTableBody');
        ongoingBody.innerHTML = ongoing.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>' :
            ongoing.map(o => {
                const user = users.find(u => u.id == o.customerId) || { firstName: 'Unknown', lastName: '' };
                return `<tr><td>${o.queueNumber}</td><td>${user.firstName || 'C'} ${user.lastName || ''}</td><td>${o.services}</td><td><button class="action-btn complete" data-id="${o.id}" data-action="completed">✓ Complete</button></td></tr>`;
            }).join('');

        const completed = orders.filter(o => o.status === 'completed');
        const completedBody = document.getElementById('completedTableBody');
        completedBody.innerHTML = completed.length === 0 ? '<tr><td colspan="4" style="text-align:center;color:#6f8fa2;">None</td></tr>' :
            completed.map(o => {
                const user = users.find(u => u.id == o.customerId) || { firstName: 'Unknown', lastName: '' };
                return `<tr><td>${o.queueNumber}</td><td>${user.firstName || 'C'} ${user.lastName || ''}</td><td>${o.services}</td><td><span class="badge completed">Done</span></td></tr>`;
            }).join('');

        document.querySelectorAll('.action-btn.start, .action-btn.complete').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                const action = this.dataset.action;
                const order = orders.find(o => o.id == id);
                const msg = action === 'ongoing' ? `Move order #${order.queueNumber} to <strong>Ongoing</strong>?` : `Mark order #${order.queueNumber} as <strong>Completed</strong>?`;
                showConfirmDialog(id, action, msg);
            });
        });
    }

    let pendingAction = null;
    function showConfirmDialog(orderId, action, message) {
        pendingAction = { orderId, action };
        document.getElementById('confirmMessage').innerHTML = message;
        document.getElementById('confirmDialog').classList.add('show');
    }
    document.getElementById('confirmCancel').addEventListener('click', function() {
        document.getElementById('confirmDialog').classList.remove('show');
        pendingAction = null;
    });
    document.getElementById('confirmOk').addEventListener('click', function() {
        if (!pendingAction) return;
        const { orderId, action } = pendingAction;
        moveOrder(orderId, action);
        document.getElementById('confirmDialog').classList.remove('show');
        pendingAction = null;
    });
    document.getElementById('confirmDialog').addEventListener('click', function(e) {
        if (e.target === this) { this.classList.remove('show'); pendingAction = null; }
    });

    function moveOrder(orderId, newStatus) {
        const orders = JSON.parse(localStorage.getItem('laundry_orders') || '[]');
        const index = orders.findIndex(o => o.id == orderId);
        if (index !== -1) {
            orders[index].status = newStatus;
            localStorage.setItem('laundry_orders', JSON.stringify(orders));
            renderAdminTables();
            const notif = document.getElementById('adminNotification');
            notif.className = 'notification show success';
            notif.innerHTML = '<i class="fas fa-check-circle"></i> Order #' + orders[index].queueNumber + ' updated to ' + newStatus.charAt(0).toUpperCase() + newStatus.slice(1) + '!';
            setTimeout(() => { notif.className = 'notification'; }, 3000);
        }
    }

    (function init() {
        const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');
        if (!users.find(u => u.role === 'admin')) {
            users.push({ id: 999, firstName: 'Admin', lastName: 'User', contact: 'admin', password: 'admin123', role: 'admin' });
            localStorage.setItem('laundry_users', JSON.stringify(users));
        }
        const pricing = JSON.parse(localStorage.getItem('laundry_pricing'));
        if (!pricing) localStorage.setItem('laundry_pricing', JSON.stringify({ wash: 50, dry: 30, fold: 20 }));
        const p = JSON.parse(localStorage.getItem('laundry_pricing'));
        document.getElementById('priceWash').value = p.wash || 50;
        document.getElementById('priceDry').value = p.dry || 30;
        document.getElementById('priceFold').value = p.fold || 20;
        const orders = JSON.parse(localStorage.getItem('laundry_orders') || '[]');
        if (orders.length === 0) {
            localStorage.setItem('laundry_orders', JSON.stringify([
                { id: 1, customerId: 1, customerName: 'Juan Dela Cruz', services: 'Wash, Dry', serviceType: 'dropoff', status: 'pending', queueNumber: 1, createdAt: new Date().toLocaleString() },
                { id: 2, customerId: 1, customerName: 'Juan Dela Cruz', services: 'Fold', serviceType: 'pickup', status: 'ongoing', queueNumber: 2, createdAt: new Date().toLocaleString() },
                { id: 3, customerId: 1, customerName: 'Juan Dela Cruz', services: 'Wash, Fold', serviceType: 'dropoff', status: 'completed', queueNumber: 3, createdAt: new Date().toLocaleString() }
            ]));
        }
        renderAdminTables();
    })();
</script>

</body>
</html>
