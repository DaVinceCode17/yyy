<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Register - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html, body {
            height: 100%;
            background: gray;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .phone-frame {
            padding-top: 50px;
            padding-bottom: 0px;
            width: 390px;
            height: 844px;
            background: #4FC3F7;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .phone-frame::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame::-webkit-scrollbar-thumb {
            background: #1f6f8a;
            border-radius: 10px;
        }
        .back-btn {
            margin-left: 10px;
            padding-right: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            text-decoration: none;
            color: #0f2b3a;
            width: fit-content;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #dce6ed;
        }
        .form-card {
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 20px 16px;
            border: 1px solid #e8eef2;
            flex: 1;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #0f2b3a;
            font-size: 0.8rem;
            margin-bottom: 3px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 50px;
            border: 1px solid #dce6ed;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
        }
        .form-group input:focus {
            border-color: #1f6f8a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(31, 111, 138, 0.1);
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .form-actions .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.25s;
        }
        .btn-danger {
            background: #b8860b;
            color: white;
        }
        .btn-danger:hover {
            background: #9e7309;
        }
        .btn-success {
            background: #1a8c4a;
            color: white;
            box-shadow: 0 4px 16px rgba(26, 140, 74, 0.2);
        }
        .btn-success:hover {
            background: #14753d;
            box-shadow: 0 8px 24px rgba(26, 140, 74, 0.25);
        }
        .notification {
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: #0f2b3a;
            display: none;
        }
        .notification.show {
            display: block;
        }
        .notification.error {
            background: #FFEBEE;
        }
        .notification.success {
            background: #E8F5E9;
        }
        @media (max-width: 430px) {
            .phone-frame {
                max-height: 98vh;
                padding: 20px 14px;
                border-radius: 30px;
            }
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div style="display: flex; align-items: center; margin-bottom: 30px;">
            <a href="index.html" class="back-btn"><i class="fa-less-than fa-2x" style="margin-left: 10px;"></i></a>
            <h2 style="flex: 1; padding-right: 30px; margin-top: 22px; text-align: center;">Register</h2>
        </div>

        <div class="form-card">
            <div id="registerNotification" class="notification"></div>

            <div style="margin-top: 30px;" class="form-group"><label>First Name</label><input type="text" id="regFirst" placeholder="Enter your first name" /></div>
            <div class="form-group"><label>Middle Initial</label><input type="text" id="regMiddle" placeholder="M." maxlength="2" /></div>
            <div class="form-group"><label>Surname</label><input type="text" id="regLast" placeholder="Enter your surname" /></div>
            <div class="form-group"><label>Address</label><input type="text" id="regAddress" placeholder="Street, City" /></div>
            <div class="form-group"><label>Contact Number</label><input type="text" id="regContact" placeholder="0917 123 4567" /></div>
            <div class="form-group"><label>Nickname</label><input type="text" id="regNick" placeholder="e.g. Coach" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Create a password" /></div>

            <div class="form-actions">
                <a href="index.html" class="btn btn-danger">Cancel</a>
                <button class="btn btn-success" id="saveRegisterBtn">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('saveRegisterBtn').addEventListener('click', function() {
            const first = document.getElementById('regFirst').value.trim();
            const last = document.getElementById('regLast').value.trim();
            const contact = document.getElementById('regContact').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const notif = document.getElementById('registerNotification');

            if (!first || !last || !contact || !pass) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill in all required fields.';
                return;
            }

            if (pass.length < 4) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be at least 4 characters.';
                return;
            }

            const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');
            if (users.find(u => u.contact === contact)) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Contact number already registered!';
                return;
            }

            const newUser = {
                id: users.length + 1,
                firstName: first,
                lastName: last,
                contact: contact,
                password: pass,
                role: 'customer'
            };
            users.push(newUser);
            localStorage.setItem('laundry_users', JSON.stringify(users));

            notif.className = 'notification show success';
            notif.innerHTML = '<i class="fas fa-check-circle"></i> Account created successfully! Redirecting...';

            setTimeout(() => {
                window.location.href = 'login.html?registered=true';
            }, 1000);
        });
    </script>

</body>
</html>
