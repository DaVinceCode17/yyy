<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Login - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html, body {
            height: 100%;
            background: gray;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .phone-frame {
            padding-top: 50px;
            padding-bottom: 0px;
            width: 390px;
            height: 844px;
            background: #4FC3F7;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .phone-frame::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame::-webkit-scrollbar-thumb {
            background: #1f6f8a;
            border-radius: 10px;
        }
        .back-btn {
            margin-left: 10px;
            padding-right: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            text-decoration: none;
            color: #0f2b3a;
            width: fit-content;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #dce6ed;
        }
        .form-card {
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid #e8eef2;
            flex: 1;
        }
        .form-card h2 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 1.4rem;
            color: #0f2b3a;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #0f2b3a;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 50px;
            border: 1px solid #dce6ed;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
        }
        .form-group input:focus {
            border-color: #1f6f8a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(31, 111, 138, 0.1);
        }
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .form-actions .btn {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.25s;
        }
        .btn-danger {
            background: #b8860b;
            color: white;
        }
        .btn-danger:hover {
            background: #9e7309;
        }
        .btn-primary {
            background: #0f2b3a;
            color: white;
            box-shadow: 0 4px 16px rgba(15, 43, 58, 0.2);
        }
        .btn-primary:hover {
            background: #1a3f52;
            box-shadow: 0 8px 24px rgba(15, 43, 58, 0.25);
        }
        .register-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #4f6f82;
        }
        .register-link a {
            color: #1f6f8a;
            font-weight: 600;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .notification {
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #0f2b3a;
            display: none;
        }
        .notification.show {
            display: block;
        }
        .notification.error {
            background: #FFEBEE;
        }
        .notification.success {
            background: #E8F5E9;
        }
        @media (max-width: 430px) {
            .phone-frame {
                max-height: 98vh;
                padding: 20px 14px;
                border-radius: 30px;
            }
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div style="display: flex; align-items: center; margin-bottom: 30px;">
            <a href="index.html" class="back-btn"><i class="fa-less-than fa-2x" style="margin-left: 10px;"></i></a>
            <h2 style="flex: 1; padding-right: 30px; margin-top: 22px; text-align: center;">Sign In</h2>
        </div>

        <div class="form-card">
            <i class="fas fa-user-circle fa-7x" style="margin-top: 55px; display: flex; justify-content: center; width: 100%;"></i>

            <div id="loginNotification" class="notification"></div>

            <div class="form-group" style="margin-top: 55px;">
                <label>Contact Number / Username</label>
                <input style="margin-top: 5px;" type="text" id="loginContact" placeholder="Enter your contact or username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input style="margin-top: 5px;" type="password" id="loginPass" placeholder="Enter your password" />
            </div>

            <div class="form-actions" style="margin-top: 30px">
                <a href="index.html" class="btn btn-danger">Cancel</a>
                <button class="btn btn-primary" id="loginBtn">Sign in</button>
            </div>

            <div class="register-link" style="margin-top: 20px">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            const contact = document.getElementById('loginContact').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const notif = document.getElementById('loginNotification');

            if (!contact || !pass) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter your credentials.';
                return;
            }

            if (contact === 'admin' && pass === 'admin123') {
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Admin login successful! Redirecting...';
                setTimeout(() => { window.location.href = 'admin.html'; }, 800);
                return;
            }

            const users = JSON.parse(localStorage.getItem('laundry_users') || '[]');
            const user = users.find(u => u.contact === contact && u.password === pass);

            if (user) {
                localStorage.setItem('current_customer_id', user.id || users.indexOf(user) + 1);
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';
                setTimeout(() => { window.location.href = 'customer.html'; }, 800);
            } else {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.';
            }
        });

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('registered') === 'true') {
                const notif = document.getElementById('loginNotification');
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Registration successful! Please log in.';
            }
        };
    </script>

</body>
</html>
